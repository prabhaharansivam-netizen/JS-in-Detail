<!DOCTYPE html>
<html>
    <body>
        
        <h2> Javascript Arrow Function </h2>
        <p> This function shows and arrow function with a parameter .</p>
        <p id="result"></p>

        <script>
            const add = (a,b) => a + b;
            document.getElementById("result").innerHTML = add(4,6);
        </script>
    </body>
</html>
